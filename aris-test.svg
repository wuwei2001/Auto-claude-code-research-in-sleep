  <text x="49" y="100" font-size="10" text-anchor="middle" fill="#da8a4a" font-weight="bold">Claude</text>

  <!-- Chat bubble 1: Claude speaks -->
  <rect x="95" y="30" width="200" height="24" fill="#fdf2e8" stroke="#da8a4a" stroke-width="1.5" rx="8"/>
  <polygon points="93,41 86,47 93,46" fill="#fdf2e8" stroke="#da8a4a" stroke-width="1.5"/>
  <rect x="92" y="40" width="3" height="7" fill="#fdf2e8"/>
  <text x="108" y="46" font-size="11">=, Review this paper...</text>

  <line x1="297" y1="42" x2="320" y2="42" stroke="#4a9eda" stroke-width="2" marker-end="url(#ar)"/>

  <!-- Chat bubble 2: GPT responds -->
  <rect x="95" y="62" width="200" height="24" fill="#e8f4fd" stroke="#4a9eda" stroke-width="1.5" rx="8"/>
  <polygon points="297,73 306,79 297,78" fill="#e8f4fd" stroke="#4a9eda" stroke-width="1.5"/>
  <rect x="295" y="72" width="3" height="7" fill="#e8f4fd"/>
  <text x="108" y="78" font-size="11">> Score: 5/10, fix...</text>

  <line x1="297" y1="84" x2="93" y2="97" stroke="#da8a4a" stroke-width="2" marker-end="url(#ar-o)"/>

  <!-- Chat bubble 3: Claude fixes -->
  <rect x="95" y="97" width="200" height="24" fill="#fdf2e8" stroke="#da8a4a" stroke-width="1.5" rx="8"/>
  <polygon points="93,108 86,114 93,113" fill="#fdf2e8" stroke="#da8a4a" stroke-width="1.5"/>
  <rect x="92" y="107" width="3" height="7" fill="#fdf2e8"/>
  <text x="108" y="113" font-size="11"> Fixed! Score: 7.5</text>

